name: Bug Report
description: File a bug report.
title: '[🐞 Bug]: '
labels: ['bug', 'triage']
projects: ['github.com/orgs/rss-mentoring-ansiv/projects/1']
type: bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: 🐛 Describe the Bug
      description: Tell us what happened and what did you expect to happen
      placeholder: Tell us what you see!
      value: 'A bug happened!'
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 💻 What OS are you using?
      options:
        - Windows
        - MacOS
      default: 0
    validations:
      required: true
  - type: dropdown
    id: browsers
    attributes:
      label: 🖥 What browsers are you seeing the problem on?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
      default: 0
    validations:
      required: true
