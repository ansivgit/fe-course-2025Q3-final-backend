name: Auto PR Template

on:
  pull_request:
    types: [opened]

jobs:
  update-pr:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract branch info
        id: branch
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          ISSUE_NUMBER=$(echo "$BRANCH_NAME" | grep -oE '[0-9]+' | head -1)
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Set PR title to branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = '${{ steps.branch.outputs.branch_name }}';
            const issueNumber = '${{ steps.branch.outputs.issue_number }}';
            const prNumber = context.payload.pull_request.number;

            let newTitle;

            if (issueNumber) {
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              const issueTitle = issue.data.title;

              let description = issueTitle;
              const colonIndex = issueTitle.indexOf(': ');
              if (colonIndex !== -1) {
                description = issueTitle.substring(colonIndex + 2); // +2 чтобы пропустить ": "
              }

              const afterNumber = branchName.substring(issueNumber.length + 1); // пропускаем "число-"
              const firstDash = afterNumber.indexOf('-');
              let type = 'task';
              if (firstDash !== -1) {
                type = afterNumber.substring(0, firstDash);
              } else {
                type = afterNumber;
              }

              newTitle = `${issueNumber}-${type}: ${description}`;
            } else {
              let cleanTitle = branchName.replace(/[-_]/g, ' ');
              cleanTitle = cleanTitle.charAt(0).toUpperCase() + cleanTitle.slice(1);
              newTitle = cleanTitle;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              title: newTitle
            });

      - name: Set assignee to creator
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              assignees: [context.actor]
            });

      - name: Add reviewers
        uses: actions/github-script@v8
        with:
          script: |
            const reviewers = ['rika-milew', 'ViktorElenich', 'zena86'];
            # const teamReviewers = ['team-slug'];

            if (reviewers.length > 0 || teamReviewers.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: reviewers,
                # team_reviewers: teamReviewers
              });
            }

      - name: Copy labels and replace placeholder in PR body
        if: steps.branch.outputs.issue_number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = ${{ steps.branch.outputs.issue_number }};
            const prNumber = context.payload.pull_request.number;

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            const labels = issue.data.labels.map(l => l.name);

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: labels
              });
            }

            const currentBody = context.payload.pull_request.body || '';
            const placeholder = '<!-- Closes issue will be added here by the bot -->';

            let newBody;
            if (currentBody.includes(placeholder)) {
              newBody = currentBody.replace(placeholder, `Closes Issue #${issueNumber}`);
            } else {
              newBody = currentBody + `\n\nCloses Issue #${issueNumber}`;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: newBody
            });
